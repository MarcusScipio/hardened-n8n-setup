# =============================================================================
# N8N Self-Hosted — Hardened Docker Compose Stack
# =============================================================================
# Works on-prem and cloud. Same security posture regardless of environment.
# Target: Linux (Ubuntu/Debian) with Docker Engine.
#
# With a domain:  Traefik uses Let's Encrypt for TLS
# Without:        Traefik uses a self-signed cert (same encryption)
#
# Bootstrap order:
#   1. ./setup.sh                                (generate .env files)
#   2. docker compose up -d                      (app stack)
#   3. cd monitoring && docker compose up -d     (monitoring stack)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — persistent backend
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    user: "70:70"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /run/postgresql:noexec,nosuid,size=8m
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      PGDATA: /var/lib/postgresql/data/pgdata
    networks:
      - n8n-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ---------------------------------------------------------------------------
  # Docker Socket Proxy — controlled API access for Traefik
  # ---------------------------------------------------------------------------
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: n8n-socket-proxy
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=8m
      - /run:noexec,nosuid,size=8m
      - /var/lib/haproxy:noexec,nosuid,size=8m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
      VERSION: 1
      INFO: 1
      POST: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      IMAGES: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SWARM: 0
      SYSTEM: 0
      VOLUMES: 0
    networks:
      - n8n-socket
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  # ---------------------------------------------------------------------------
  # Traefik — reverse proxy, TLS termination, security middleware
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.3
    container_name: n8n-traefik
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    environment:
      DOCKER_API_VERSION: "1.40"
    depends_on:
      - socket-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik_certs:/certs
    command:
      # --- Entrypoints ---
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      # --- TLS ---
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-noop@localhost}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # --- Provider (via socket proxy) ---
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=n8n-frontend"
      # --- Internal metrics entrypoint ---
      - "--entrypoints.metrics.address=:8082"
      - "--metrics.prometheus.entrypoint=metrics"
      # --- Ping (for healthcheck) ---
      - "--ping=true"
      # --- API / Dashboard ---
      - "--api.dashboard=false"
      # --- Logging ---
      - "--log.level=WARN"
      - "--accesslog=true"
      - "--accesslog.bufferingsize=100"
      # --- Metrics for Prometheus ---
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
    networks:
      - n8n-socket
      - n8n-frontend
      - n8n-monitoring
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ---------------------------------------------------------------------------
  # n8n — workflow automation engine (queue mode)
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-app
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    volumes:
      - n8n_data:/home/node/.n8n
      - n8n_files:/files
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY is required}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_JWT_SECRET:?N8N_JWT_SECRET is required}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${N8N_PROTOCOL:-https}://${N8N_HOST:-localhost}/
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "true"
      N8N_METRICS: "true"
      N8N_METRICS_PREFIX: n8n_
      N8N_METRICS_INCLUDE_QUEUE_METRICS: "true"
      N8N_METRICS_INCLUDE_API_ENDPOINTS: "true"
      N8N_METRICS_INCLUDE_MESSAGE_EVENT_BUS_METRICS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - n8n-backend
      - n8n-frontend
      - n8n-monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=${TRAEFIK_RULE:-PathPrefix(`/`)}"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "traefik.http.routers.n8n.middlewares=n8n-headers@docker,n8n-ratelimit@docker"
      - "traefik.http.middlewares.n8n-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.n8n-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.n8n-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.n8n-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.n8n-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.n8n-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.n8n-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.n8n-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.n8n-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()"
      - "traefik.http.middlewares.n8n-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.n8n-ratelimit.ratelimit.burst=50"
      - "traefik.http.middlewares.n8n-ratelimit.ratelimit.period=1m"

  # ---------------------------------------------------------------------------
  # Redis — queue backend for scaling & reliability
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: n8n-redis
    restart: unless-stopped
    user: "999:999"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --protected-mode yes
      --rename-command FLUSHDB ""
      --rename-command FLUSHALL ""
      --rename-command DEBUG ""
    networks:
      - n8n-backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ---------------------------------------------------------------------------
  # PostgreSQL Backup — automated daily dumps
  # ---------------------------------------------------------------------------
  pg-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: n8n-pg-backup
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    volumes:
      - pg_backups:/backups
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - n8n-backend
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local
  n8n_files:
    driver: local
  traefik_certs:
    driver: local
  pg_backups:
    driver: local

# =============================================================================
# Networks — created here, consumed by monitoring stack as external
# =============================================================================
networks:
  n8n-socket:
    name: n8n-socket
    driver: bridge
    internal: true
  n8n-backend:
    name: n8n-backend
    driver: bridge
    internal: true
  n8n-frontend:
    name: n8n-frontend
    driver: bridge
  n8n-monitoring:
    name: n8n-monitoring
    driver: bridge
    internal: true
