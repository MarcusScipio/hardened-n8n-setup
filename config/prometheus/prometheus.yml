global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "n8n"
    metrics_path: /metrics
    static_configs:
      - targets: ["n8n:5678"]
        labels:
          instance: "n8n-app"

  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8082"]
        labels:
          instance: "n8n-traefik"

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          instance: "n8n-postgres"

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          instance: "n8n-redis"
